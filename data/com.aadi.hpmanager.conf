<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.aadi.hpmanager"/>
  </policy>

  <!-- Allow any local user to communicate with the daemon -->
  <policy context="default">
    <allow send_destination="com.aadi.hpmanager"/>
    <allow receive_sender="com.aadi.hpmanager"/>
  </policy>
</busconfig>
